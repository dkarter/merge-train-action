name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  STABLE_MAJOR_TAG: v1

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-stable-major-tag:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' && startsWith(needs.release-please.outputs.tag_name, format('{0}.', env.STABLE_MAJOR_TAG))
    permissions:
      contents: write
    steps:
      - name: Move stable major tag to release commit
        uses: actions/github-script@v7
        env:
          RELEASE_SHA: ${{ needs.release-please.outputs.sha }}
          STABLE_MAJOR_TAG: ${{ env.STABLE_MAJOR_TAG }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const stableMajorTag = process.env.STABLE_MAJOR_TAG;
            const ref = `tags/${stableMajorTag}`;
            const sha = process.env.RELEASE_SHA;

            if (!stableMajorTag) {
              core.setFailed('Missing stable major tag value.');
              return;
            }

            if (!sha) {
              core.setFailed('Missing release commit SHA from release-please outputs.');
              return;
            }

            try {
              const existingRef = await github.rest.git.getRef({ owner, repo, ref });

              if (existingRef.data.object.sha === sha) {
                core.info(`${stableMajorTag} already points to ${sha}; skipping update.`);
                return;
              }

              await github.rest.git.updateRef({ owner, repo, ref, sha, force: true });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.git.createRef({ owner, repo, ref: `refs/${ref}`, sha });
                return;
              }

              throw error;
            }
