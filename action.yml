name: Merge Train Action
description: Safely prepares labeled pull requests for merge-train workflows.
author: merge-train-action maintainers
inputs:
  token:
    description: Token used for pull request update/check/comment/merge API calls (requires contents:write, pull-requests:write, issues:write, statuses:read; add checks:write when rerun-failed-checks is enabled).
    required: true
  label-name:
    description: Label that marks pull requests as merge-train candidates.
    required: false
    default: ready-to-merge
  wait-timeout-seconds:
    description: Maximum seconds to wait for required checks before blocking.
    required: false
    default: '600'
  poll-interval-seconds:
    description: Poll interval in seconds for mergeability and check state.
    required: false
    default: '15'
  rerun-failed-checks:
    description: Whether to request one-time rerun for failed required check-runs.
    required: false
    default: 'true'
  pause:
    description: Whether to pause merge-train processing and exit as a clean no-op.
    required: false
    default: 'false'
  pause-reason:
    description: Optional operator-provided reason emitted in logs when pause is enabled.
    required: false
    default: ''
  trust-same-repo-only:
    description: Require pull requests to originate from the same repository before merge-train execution.
    required: false
    default: 'true'
  trust-min-author-association:
    description: Optional minimum pull request author association (NONE, FIRST_TIME_CONTRIBUTOR, FIRST_TIMER, CONTRIBUTOR, COLLABORATOR, MEMBER, OWNER).
    required: false
    default: ''
  trust-author-allowlist:
    description: Optional comma-separated list of trusted PR author logins; allowlisted authors bypass minimum author association checks.
    required: false
    default: ''
  trust-require-approved-review:
    description: Require GitHub review decision to be APPROVED before merge-train execution.
    required: false
    default: 'false'
  auto-delete-source-branch:
    description: Attempt to delete the merged pull request source branch after merge when safe checks pass (same repository, branch exists, and token can delete refs).
    required: false
    default: 'false'
outputs:
  label-name:
    description: Label value used by the action run.
  status:
    description: Final state (`merged`, `blocked`, or `noop`) for downstream steps.
runs:
  using: node24
  main: dist/index.js
branding:
  icon: git-merge
  color: blue
