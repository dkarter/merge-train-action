version: '3'

tasks:
  lint:
    desc: Run ESLint checks
    cmds:
      - npm run lint

  format:check:
    desc: Run Prettier checks
    cmds:
      - npm run format:check

  test:
    desc: Run unit tests
    cmds:
      - npm test

  package:
    desc: Build action distribution bundle
    cmds:
      - npm run package
