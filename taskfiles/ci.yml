version: '3'

tasks:
  lint:
    desc: Run ESLint checks
    cmds:
      - bun run lint

  format:check:
    desc: Run Prettier checks
    cmds:
      - bun run format:check

  test:
    desc: Run unit tests
    cmds:
      - bun test

  package:
    desc: Build action distribution bundle
    cmds:
      - bun run package
