version: '3'

tasks:
  lint:
    desc: Run ESLint checks
    cmds:
      - bun run lint

  format:check:
    desc: Run Prettier checks
    cmds:
      - bun run format:check

  test:
    desc: Run unit tests
    cmds:
      - bun run test

  package:
    desc: Build action distribution bundle
    cmds:
      - bun run package

  dist:check:
    desc: Verify dist artifacts and package side effects
    cmds:
      - bun run dist:check

  audit:
    desc: Run dependency vulnerability audit
    cmds:
      - bun run audit

  secrets:scan:
    desc: Scan repository history for leaked secrets
    cmds:
      - bun run secrets:scan

  security:
    desc: Run all security checks
    cmds:
      - bun run audit
      - bun run secrets:scan

  all:
    desc: Run full CI quality and security checks
    cmds:
      - bun run ci
